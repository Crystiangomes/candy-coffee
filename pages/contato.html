<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Contato</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- CABEÇALHO -->
    <header>
    <nav class="nav-principal">
        <div class="nav-logo">
            <a href="../index.html"><img src="../imagens/candy.png" alt="Logo da Candy Coffee"></a>
        </div>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="sobre.html">Sobre</a>
            <a href="cardapio.html">Cardápio</a>
            <a href="contato.html">Contato</a>
            <a href="produtos.html">Produtos</a>
        </div>
        <div class="nav-local">
            <img class="iconenav" src="../imagens/Iconelocal.png" alt="Icone de localização" width="40" height="40">
            <p>Encontre uma de nós</p>
        </div>
    </nav>
</header>



    <!-- SEÇÃO DE CONTATO COM IMAGEM -->
    <section class="contato-container">

        <!-- LADO ESQUERDO COM IMAGEM -->
        <div class="contato">
            <img src="../imagens/cafecontato.png">
        </div>

        <!-- LADO DIREITO COM FORMULÁRIO -->
        <div class="contato">

            <h2>Fale Conosco</h2>

            <form  id="formContato">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Digite seu nome" required>
                <br>
                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="Digite seu e-mail" required>
                <br>
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" rows="5" placeholder="Digite sua mensagem"></textarea>
                <br>
                <button type="submit">Enviar</button>
            </form>

        </div>

    </section>

    <!-- RODAPÉ -->
    <footer class="rodape">
        <p>2025 Candy Coffee. Todos os direitos reservados</p>
        <p><a href="contato.html">Contato</a></p>
    </footer>

    <script src="../js/contato.js"></script>

</body>
</html>
